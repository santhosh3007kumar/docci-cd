version: "3.8"

services:
  frontend:
    image: santhosh3007/frontend:v1
    networks:
      - app-network

  backend:
    image: santhosh3007/backend:v1
    volumes:
      - /opt/app/backend-logs:/app/logs
    networks:
      - app-network

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appdb
    volumes:
      - /opt/app/mysql-data:/var/lib/mysql
    networks:
      - app-network

  nginx:
    image: nginx:latest
    ports:
      - "80:80"   # Host access
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge