version: "3.8"

services:
  frontend:
    image: santhosh3007/frontend:v1
    # No ports, Nginx will serve it internally

  backend:
    image: santhosh3007/backend:v1
    ports:
      - "5000:5000"  # Optional: expose backend to host
    volumes:
      - /opt/app/backend-logs:/app/logs

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appdb
    volumes:
      - /opt/app/mysql-data:/var/lib/mysql

  nginx:
    image: nginx:latest
    ports:
      - "80:80"   # Host accesses through Nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend