name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Images
        run: docker compose -f docker-compose-build.yml build

      - name: Tag Images
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          docker tag santhosh3007/frontend:v1 santhosh3007/frontend:$IMAGE_TAG
          docker tag santhosh3007/backend:v1 santhosh3007/backend:$IMAGE_TAG
          echo "Tagged images with $IMAGE_TAG"

      - name: Push Images
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          docker push santhosh3007/frontend:v1
          docker push santhosh3007/frontend:$IMAGE_TAG
          docker push santhosh3007/backend:v1
          docker push santhosh3007/backend:$IMAGE_TAG